# ABOUTME: Builds and pushes the container image to ghcr.io on pushes to main and version tags.
# ABOUTME: Tags images as :latest on main, :vX.Y.Z on release tags.

name: Build container

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "edookit.py"
      - "gather_updates.py"
      - "requirements.txt"
      - "Containerfile"

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Determine image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: podman build -t ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} .

      - name: Push image
        run: podman push ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }}

      - name: Push latest for tags too
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          podman tag ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} ghcr.io/${{ github.repository }}:latest
          podman push ghcr.io/${{ github.repository }}:latest
